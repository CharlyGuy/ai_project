[theme]
primaryColor = "#E60000"
backgroundColor = "#0D0D0D"
secondaryBackgroundColor = "#161618"
textColor = "#f5f5f5"
font = "sans serif"

[client]
showErrorDetails = false
toolbarMode = "auto"

[server]
maxUploadSize = 200
enableXsrfProtection = true
enableCORS = false

[logger]
level = "info"

[runner]
magicEnabled = true

[deprecation]
showPyplotGlobalUse = false
