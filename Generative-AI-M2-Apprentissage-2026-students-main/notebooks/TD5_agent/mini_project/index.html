<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PIM Copilot — Catalog Enrichment Agent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 800px;
      height: 80vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 12px 12px 0 0;
      text-align: center;
    }
    header h1 { font-size: 24px; margin-bottom: 4px; }
    header p { font-size: 12px; opacity: 0.9; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      padding: 14px;
      border-radius: 8px;
      line-height: 1.5;
      max-width: 85%;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #667eea;
      color: white;
      border-radius: 8px 0 8px 8px;
    }
    .msg.agent {
      align-self: flex-start;
      background: #f5f5f5;
      color: #333;
      border-left: 4px solid #667eea;
    }
    .msg.error {
      align-self: flex-start;
      background: #fee;
      color: #c33;
      border-left: 4px solid #c33;
    }
    .msg.loading {
      align-self: flex-start;
      background: #f0f0f0;
      color: #666;
      font-style: italic;
    }
    footer {
      border-top: 1px solid #eee;
      padding: 16px;
      background: #fafafa;
      border-radius: 0 0 12px 12px;
    }
    form {
      display: flex;
      gap: 12px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    button:hover:not(:disabled) { background: #5568d3; }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 12px;
    }
    code {
      background: #f5f5f5;
      padding: 2px 4px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🛠️ PIM Copilot</h1>
      <p>Paste supplier product info → Agent enriches your catalog</p>
    </header>

    <div id="chat"></div>

    <footer>
      <form id="ask-form">
        <input type="text" id="message" placeholder="Paste supplier product info here..." autofocus>
        <button type="submit" id="send-btn">Enrich</button>
      </form>
      <div class="hint">
        Example: <code>Apple AirPods Pro, brand Apple, category Headphones, €280, noise-cancelling, 30h battery</code>
      </div>
    </footer>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("ask-form");
    const input = document.getElementById("message");
    const btn = document.getElementById("send-btn");

    function addMsg(role, text) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addMsg("user", message);
      input.value = "";
      btn.disabled = true;

      addMsg("loading", "Agent is enriching your product...");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();

        // Remove loading message
        chat.removeChild(chat.lastChild);

        if (data.success) {
          addMsg("agent", data.reply);
        } else {
          addMsg("error", `Error: ${data.reply}`);
        }
      } catch (err) {
        chat.removeChild(chat.lastChild);
        addMsg("error", `Network error: ${err.message}`);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
